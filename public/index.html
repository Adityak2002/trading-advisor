<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Advisor Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <h1>Trading Advisor</h1>
            </div>
            <div class="actions">
                <button id="trigger-btn" class="btn btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.8-5.8"/></svg>
                    Trigger Scan
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <nav class="nav-tabs">
                    <button class="tab-btn active" data-mode="stock">Stock Delivery</button>
                    <button class="tab-btn" data-mode="etf">ETF Swing</button>
                    <button class="tab-btn" data-mode="intraday">⚡ Intraday</button>
                </nav>
            </aside>

            <!-- Middle: Report Viewing Area -->
            <section class="report-view">
                <div class="report-header">
                    <h2 id="report-title">Loading Report...</h2>
                    <span id="report-timestamp" class="timestamp"></span>
                </div>
                
                <div id="report-content" class="markdown-body">
                    <!-- Markdown will be rendered here -->
                </div>
            </section>

            <!-- Right Sidebar: Gemini Chat -->
            <aside class="chat-sidebar">
                <div class="chat-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <h3>Gemini Chat</h3>
                </div>
                
                <div class="chat-history" id="chat-history">
                    <div class="chat-message assistant">
                        <div class="message-bubble markdown-body">
                            <p>Hi! I'm ready to answer any questions about the current report. Or, click below to generate a quick summary!</p>
                            <button id="quick-summary-btn" class="btn btn-primary" style="margin-top: 10px;">Generate Summary</button>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <textarea id="chat-input" placeholder="Ask about the report..." rows="1"></textarea>
                    <button id="send-btn" class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
