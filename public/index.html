<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Advisor Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <h1>Trading Advisor</h1>
            </div>
            <div class="actions">
                <button id="trigger-btn" class="btn btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.8-5.8"/></svg>
                    Trigger Scan
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Sidebar for controls -->
            <aside class="sidebar">
                <nav class="nav-tabs">
                    <button class="tab-btn active" data-mode="stock">Stock Delivery</button>
                    <button class="tab-btn" data-mode="etf">ETF Swing</button>
                </nav>
                
                <div class="ai-card">
                    <div class="ai-card-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <h3>Gemini Analysis</h3>
                    </div>
                    <p class="ai-desc">Get an AI-generated summary and actionable insights for the current report.</p>
                    <button id="analyze-btn" class="btn btn-primary w-full">Generate Insights</button>
                </div>
            </aside>

            <!-- Main report viewing area -->
            <section class="report-view">
                <div id="ai-insights-container" class="insights-container hidden">
                    <div class="insights-header">
                        <h4>✨ AI Insights</h4>
                        <button id="close-insights" class="btn-icon">×</button>
                    </div>
                    <div id="insights-content" class="markdown-body loading">Analyzing...</div>
                </div>

                <div class="report-header">
                    <h2 id="report-title">Loading Report...</h2>
                    <span id="report-timestamp" class="timestamp"></span>
                </div>
                
                <div id="report-content" class="markdown-body">
                    <!-- Markdown will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
